name: C/C++ CLI

on:
  push:
    branches:
      - master
      - renovate/**
    tags:
      - "*"
  pull_request:

jobs:
  build-cli:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: apk add --no-cache build-base cmake ninja openssl-dev openssl-libs-static
      - name: Configure
        run: >
          cmake -S src_cli -B src_cli/build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOPENSSL_USE_STATIC_LIBS=TRUE
          -DCMAKE_EXE_LINKER_FLAGS="-static"
      - name: Build
        run: cmake --build src_cli/build --config Release
      - name: Test
        run: ctest --test-dir src_cli/build --output-on-failure
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nat_type_tester_cli_build
          path: src_cli/build
          if-no-files-found: error
